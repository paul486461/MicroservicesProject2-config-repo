server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: product
          uri: http://service-product:8082
          predicates:
            - Path=/products/**
          filters:
            - StripPrefix=1
      default-filters:
        - name: Retry
          args:
            retries: 2
            statuses:
              - BAD_GATEWAY
              - SERVICE_UNAVAILABLE
              - GATEWAY_TIMEOUT
